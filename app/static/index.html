<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOLPICK</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">SOLPICK</p>
        <h1>태양광 설치 경제성 분석 및 시공사 매칭</h1>
        <p class="subtitle">
          지역, 면적, 방향, 전기요금 정보를 입력하면 예상 발전량, 회수기간, ROI, 추천 시공사를 계산합니다.
        </p>
      </div>
    </section>

    <section class="layout">
      <form id="analysis-form" class="card form-card">
        <h2>설치 조건 입력</h2>

        <label>지역
          <select id="region" name="region"></select>
        </label>

        <label>사용자 유형
          <select id="user_type" name="user_type"></select>
        </label>

        <label>지붕 면적(m²)
          <input type="number" id="roof_area_m2" value="30" min="1" step="1" />
        </label>

        <label>지붕 사용 가능 비율
          <input type="number" id="roof_usage_ratio" value="0.75" min="0.1" max="1" step="0.05" />
        </label>

        <label>경사각(도)
          <input type="number" id="tilt_deg" value="30" min="0" max="90" step="1" />
        </label>

        <label>방위각(도, 남향=180)
          <input type="number" id="azimuth_deg" value="180" min="0" max="360" step="1" />
        </label>

        <label>음영 수준
          <select id="shading_level" name="shading_level"></select>
        </label>

        <label>월 전기요금(원)
          <input type="number" id="monthly_bill_krw" value="120000" min="10000" step="1000" />
        </label>

        <label>전기요금 단가(원/kWh)
          <input type="number" id="electricity_price_krw_per_kwh" value="180" min="1" step="1" />
        </label>

        <label>예산(선택)
          <input type="number" id="budget_krw" placeholder="예: 8000000" min="0" step="100000" />
        </label>

        <button type="submit">분석하기</button>
      </form>

      <section class="results">
        <div class="kpi-grid">
          <div class="card kpi">
            <span>예상 설비용량</span>
            <strong id="capacity">-</strong>
          </div>
          <div class="card kpi">
            <span>연간 발전량</span>
            <strong id="annual-generation">-</strong>
          </div>
          <div class="card kpi">
            <span>예상 지원금</span>
            <strong id="subsidy">-</strong>
          </div>
          <div class="card kpi">
            <span>최상위 회수기간</span>
            <strong id="payback">-</strong>
          </div>
        </div>

        <div class="card">
          <h2>월별 예상 발전량</h2>
          <canvas id="generation-chart" height="120"></canvas>
        </div>

        <div class="card">
          <h2>추천 시공사</h2>
          <div id="installer-list" class="installer-list"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
